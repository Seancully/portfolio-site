<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>404 — lost in the grid</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235eead4'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='6' y='6' width='20' height='20' rx='3' fill='none' stroke='url(%23g)' stroke-width='2'/%3E%3Crect x='10' y='10' width='12' height='12' rx='1' fill='url(%23g)' opacity='.5'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#05070a; --fg:#e7ecef; --fg-dim:#8a94a0; --fg-faint:#4a525c;
    --mint:#5eead4; --blue:#6366f1;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden}
  a{color:inherit}
  .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 60%,#0b1016 0%,#05070a 70%,#000 100%)}
  .bg::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(to right,rgba(94,234,212,.05) 1px,transparent 1px),
      linear-gradient(to bottom,rgba(94,234,212,.05) 1px,transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse at center,#000 20%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 20%,transparent 75%);
  }
  .bg::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.6) 90%);
  }
  img.cube{
    position:fixed;top:50%;left:50%;
    width:min(90vw,600px);transform:translate(-50%,-50%);
    mix-blend-mode:screen;filter:saturate(1.05) hue-rotate(10deg);
    opacity:.8;pointer-events:none;z-index:1;
    animation:float 6s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translate(-50%,-50%) rotate(-2deg)}50%{transform:translate(-50%,-54%) rotate(2deg)}}
  main{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  .tag{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--mint);margin-bottom:20px}
  h1{
    font-family:var(--mono);font-weight:500;font-size:clamp(72px,14vw,180px);
    line-height:1;letter-spacing:-.04em;
    background:linear-gradient(110deg,#eafffb,var(--mint),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 30px rgba(0,0,0,.9));margin-bottom:16px;
  }
  p{color:var(--fg-dim);font-size:15px;max-width:420px;margin-bottom:28px;text-shadow:0 1px 20px rgba(0,0,0,.8)}
  .home{
    font-family:var(--mono);font-size:13px;
    padding:12px 22px;border:1px solid rgba(255,255,255,.14);border-radius:999px;
    color:var(--fg);transition:all 200ms;text-decoration:none;display:inline-flex;gap:10px;align-items:center;
    background:rgba(10,14,20,.6);backdrop-filter:blur(10px);
  }
  .home:hover{border-color:var(--mint);color:var(--mint);background:rgba(94,234,212,.05)}
  .meta{margin-top:28px;font-family:var(--mono);font-size:11px;color:var(--fg-faint);letter-spacing:.15em;text-transform:uppercase}
</style>
</head>
<body>
<div class="bg"></div>
<img class="cube" src="assets/frames/121.webp" alt="" aria-hidden="true" />
<main>
  <p class="tag">// error — 404</p>
  <h1>404</h1>
  <p>lost in the grid. this page doesn't exist, or the cube has rearranged itself since you last checked.</p>
  <a class="home" href="/">← back to sean.dev</a>
  <p class="meta">coordinate out of bounds</p>
</main>
</body>
</html>
