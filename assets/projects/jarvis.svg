  <text x="250" y="230" font-family="ui-monospace, Menlo, monospace" font-size="28" fill="url(#t)" text-anchor="middle" font-weight="600" letter-spacing="6">JARVIS</text>
  <text x="250" y="252" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="3">LOCAL · VOICE · AGENTIC</text>
